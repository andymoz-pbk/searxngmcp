# searxngmcp — MCP server wrapping SearXNG
#
# Two modes:
#
# 1. Launch a BUNDLED SearXNG (auto-configured with JSON format):
#      docker compose --profile searxng up -d
#    The bundled SearXNG listens on port 8888, MCP on 8000.
#    MCP connects to SearXNG internally via Docker network.
#
# 2. Use an EXISTING SearXNG instance (e.g. one already running on the host):
#      SEARXNGMCP_SEARXNG_URL=http://YOUR-SEARXNG-IP:8080 docker compose up -d
#
# All SEARXNGMCP_* env vars:
#
#   SEARXNGMCP_SEARXNG_BASE_URL          searxng.base_url          (default: http://localhost:8080)
#   SEARXNGMCP_SEARXNG_TIMEOUT           searxng.timeout           (default: 30)
#   SEARXNGMCP_SERVER_HOST               server.host               (default: 0.0.0.0)
#   SEARXNGMCP_SERVER_PORT               server.port               (default: 8000)
#   SEARXNGMCP_SEARCH_DEFAULT_MAX_RESULTS  search.default_max_results  (default: 10)
#   SEARXNGMCP_SEARCH_MAX_MAX_RESULTS    search.max_max_results    (default: 50)
#   SEARXNGMCP_SEARCH_DEFAULT_CATEGORIES search.default_categories (default: general)
#   SEARXNGMCP_SEARCH_DEFAULT_LANGUAGE   search.default_language   (default: "")
#   SEARXNGMCP_SEARCH_DEFAULT_SAFESEARCH search.default_safesearch (default: 0)
#   SEARXNGMCP_FETCH_MAX_CONTENT_LENGTH  fetch.max_content_length  (default: 1048576)
#   SEARXNGMCP_FETCH_TIMEOUT             fetch.timeout             (default: 30)
#   SEARXNGMCP_FETCH_USER_AGENT          fetch.user_agent          (default: searxngmcp/1.0)
#   SEARXNGMCP_LOGGING_LEVEL             logging.level             (default: info)

services:
  searxng:
    profiles: ["searxng"]
    image: searxng/searxng:latest
    ports:
      - "0.0.0.0:8888:8080"
    volumes:
      - ./searxng-settings.yml:/etc/searxng/settings.yml
    restart: unless-stopped

  searxngmcp:
    image: ghcr.io/andymoz-pbk/searxngmcp:latest
    # build: .                                 # uncomment to build locally
    ports:
      - "0.0.0.0:8000:8000"
    environment:
      - SEARXNGMCP_SEARXNG_BASE_URL=${SEARXNGMCP_SEARXNG_URL:-http://searxng:8080}
      - SEARXNGMCP_SERVER_HOST=0.0.0.0
      - SEARXNGMCP_SERVER_PORT=8000
    restart: unless-stopped
